# 既知URLの監視: watchlist の全URLを巡回し、ドローン語周辺の「文の変化」・
# 新規キーワード出現・リンク切れを検出して Issue 化する（規制の新設・改定・緩和を拾う）。
# discover が「新しいページを探す」のに対し、こちらは「登録済みページの変化を見張る」。
#
# 毎回 watchlist を全件（現在155URL）見るが、ETag/Last-Modified による条件付きGETで
# 未変更ページは本文を送らせないため軽い。全国展開でURLが増えたらローリングを検討する。
name: drone-regulation-monitor

on:
  schedule:
    # 毎日 05:00 JST (UTC 20:00)。discover 03:00 → classify 04:00 の後ろに置く。
    # cron の曜日欄は UTC 基準。JST の曜日を意図して指定すると1日ずれるので、
    # 曜日を使うときは注意（以前 '0 21 * * 1' が「月曜のつもりで火曜」に発火していた）。
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests beautifulsoup4 pdfminer.six

      - name: Run crawl & diff
        id: crawl
        run: |
          set +e
          python scripts/crawl_check.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit updated snapshots
        run: |
          git config user.name  "drone-monitor-bot"
          git config user.email "actions@github.com"
          git add data/snapshots reports 2>/dev/null || true
          git commit -m "chore(monitor): update snapshots ($(date +%F))" || echo "no changes"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"

      - name: Open issue if changes detected
        if: steps.crawl.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10);
            const path = `reports/diff_${date}.md`;
            let body = '差分レポートが見つかりませんでした。';
            try { body = fs.readFileSync(path, 'utf8'); } catch (e) {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `規制ページの変化を検出 ${date}`,
              body: body + '\n\n---\n既知ページの変化とリンク切れの記録です。' +
                    '\n規制の内容が変わっていた場合、その公式ページを `data/discovery/queue.json` に' +
                    ' 積めば classify が逐語確認のうえ再判定します（出典は公式一次情報のみ）。'
            });
