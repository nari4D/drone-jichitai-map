# 既知URLの監視: watchlist の全URLを巡回し、ドローン語周辺の「文の変化」・
# 新規キーワード出現・リンク切れを検出して Issue 化する（規制の新設・改定・緩和を拾う）。
# discover が「新しいページを探す」のに対し、こちらは「登録済みページの変化を見張る」。
#
#
# 週次である理由（毎日にするな）:
#   watchlist を毎回全件（現在155URL）スイープする。監視対象は自治体の規制ページで、
#   条例改正やページ改訂は年単位でしか起きない。毎日見ても検出が平均3日早まるだけで、
#   その代わり公共サーバーへのリクエストが7倍になる（全国展開すれば監視URLは数千）。
#   ETag/Last-Modified の条件付きGETは「本文を送らせない」だけで、304 も1リクエスト
#   であり相手の負担は消えない。新規ページの発見は discover が毎日やっている。
#   monitor が見るのはシステム内で最も動きの遅い信号なので、週1で足りる。
name: drone-regulation-monitor

on:
  schedule:
    # 毎週月曜 06:00 JST = UTC 日曜 21:00。
    # cron の曜日欄は UTC 基準（0=日）。JST の曜日のつもりで書くと1日ずれる
    # （'0 21 * * 1' は「月曜のつもりで JST 火曜」に発火していた。初回コミットからのバグ）。
    - cron: '0 21 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests beautifulsoup4 pdfminer.six

      - name: Run crawl & diff
        id: crawl
        run: |
          set +e
          python scripts/crawl_check.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit updated snapshots
        run: |
          git config user.name  "drone-monitor-bot"
          git config user.email "actions@github.com"
          git add data/snapshots reports 2>/dev/null || true
          git commit -m "chore(monitor): update snapshots ($(date +%F))" || echo "no changes"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"

      - name: Open issue if changes detected
        if: steps.crawl.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10);
            const path = `reports/diff_${date}.md`;
            let body = '差分レポートが見つかりませんでした。';
            try { body = fs.readFileSync(path, 'utf8'); } catch (e) {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `規制ページの変化を検出 ${date}`,
              body: body + '\n\n---\n既知ページの変化とリンク切れの記録です。' +
                    '\n規制の内容が変わっていた場合、その公式ページを `data/discovery/queue.json` に' +
                    ' 積めば classify が逐語確認のうえ再判定します（出典は公式一次情報のみ）。'
            });
